# Local testing override — keeps the API private to the server and
# exposes it on loopback for host-side testing.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Logs:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml logs -f worker

services:
  api:
    ports:
      - "127.0.0.1:8001:8000"
