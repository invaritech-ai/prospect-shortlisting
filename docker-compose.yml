services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/v1/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Scrape workers are split by fetch mode (no cross-fallback).
  # 2 workers use Browserless CDP (remote Chrome, different egress IP).
  # 2 workers use local headless Chromium.
  # Both consume from the same "scrape" queue — Redis round-robins tasks.
  worker-scrape-browserless:
    build:
      context: .
      dockerfile: Dockerfile.scrape
    env_file:
      - .env
    # PS_BROWSERLESS_URL from .env is used as-is; concurrency=2 matches
    # the Browserless plan's 2 concurrent session limit.
    command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "-Q", "scrape", "-n", "browserless@%h", "-c", "2", "--without-mingle", "--without-gossip", "--max-tasks-per-child=20", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  worker-scrape-local:
    build:
      context: .
      dockerfile: Dockerfile.scrape
    env_file:
      - .env
    environment:
      # Override: clear browserless URL so this worker uses local Chromium only.
      PS_BROWSERLESS_URL: ""
    command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "-Q", "scrape", "-n", "local@%h", "-c", "2", "--without-mingle", "--without-gossip", "--max-tasks-per-child=20", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  worker-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "-Q", "analysis,beat,contacts", "-c", "8", "--without-mingle", "--without-gossip", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["uv", "run", "celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
