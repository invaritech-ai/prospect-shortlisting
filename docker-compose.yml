services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/v1/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Scrape workers: both local-only until Browserless paid plan.
  # Keeping original service names so Coolify doesn't break on rename.
  # To re-enable Browserless: remove PS_BROWSERLESS_URL override from worker-scrape-browserless.
  worker-scrape-browserless:
    build:
      context: .
      dockerfile: Dockerfile.scrape
    env_file:
      - .env
    environment:
      PS_BROWSERLESS_URL: ""
      PS_WORKER_PROCESS: "1"
    command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "-Q", "scrape", "-n", "browserless@%h", "-c", "6", "--without-mingle", "--without-gossip", "--max-tasks-per-child=20", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  worker-scrape-local:
    build:
      context: .
      dockerfile: Dockerfile.scrape
    env_file:
      - .env
    environment:
      PS_BROWSERLESS_URL: ""
      PS_WORKER_PROCESS: "1"
    command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "-Q", "scrape", "-n", "local@%h", "-c", "6", "--without-mingle", "--without-gossip", "--max-tasks-per-child=20", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  worker-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PS_WORKER_PROCESS: "1"
    command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "-Q", "analysis,beat,contacts", "-c", "8", "--without-mingle", "--without-gossip", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["uv", "run", "celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # Operator UI (Vite). Pair with docker-compose.local.yml so the browser can
  # reach the API via the loopback-only host mapping on :8001.
  # Start with: docker compose -f docker-compose.yml -f docker-compose.local.yml --profile ui up -d
  # Or on the host: cd apps/web && npm run dev → http://127.0.0.1:5173
  web:
    profiles: ["ui"]
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      USE_POLLING: "1"
      # Browser on the host calls the API through the local override's loopback mapping.
      VITE_API_BASE_URL: http://127.0.0.1:8001
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  web_node_modules:
