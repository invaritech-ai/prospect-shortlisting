services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/v1/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Scrape worker: local headless Chromium only.
  # Browserless disabled until paid plan — free tier (1000 credits/mo) insufficient for volume.
  # To re-enable: split into worker-scrape-browserless (c=2) + worker-scrape-local (c=2).
  worker-scrape:
    build:
      context: .
      dockerfile: Dockerfile.scrape
    env_file:
      - .env
    environment:
      PS_BROWSERLESS_URL: ""
    command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "-Q", "scrape", "-n", "scrape@%h", "-c", "4", "--without-mingle", "--without-gossip", "--max-tasks-per-child=20", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  worker-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "-Q", "analysis,beat,contacts", "-c", "8", "--without-mingle", "--without-gossip", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["uv", "run", "celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
