worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  access_log  /dev/stdout;
  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  server_tokens off;
  keepalive_timeout 65;
  types_hash_max_size 4096;

  gzip               on;
  gzip_vary          on;
  gzip_proxied       any;
  gzip_comp_level    6;
  gzip_min_length    1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  server {
    listen      0.0.0.0:80 default_server;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # ── Cache policy ─────────────────────────────────────────────────────────
    # Vite emits content-hashed files under /assets/ (immutable per deploy) and
    # a non-hashed index.html that references them. If index.html is cached at
    # the edge/browser past a deploy, clients will request asset hashes the new
    # container no longer has → blank page / MIME-type errors. So:
    #   • /assets/*  → public, immutable, one year
    #   • everything else (index.html, favicons, manifest, SPA routes) → no-store

    # Hashed bundles. Safe to cache forever on success. On miss we must return
    # a non-cacheable 404 so that a stale asset hash (e.g. a client holding an
    # old index.html after a redeploy) cannot be cached as "404 immutable".
    location ^~ /assets/ {
      access_log off;
      error_page 404 = @assets_miss;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    location @assets_miss {
      internal;
      add_header Cache-Control "no-store, must-revalidate" always;
      add_header Pragma       "no-cache"                   always;
      add_header Expires      "0"                          always;
      return 404;
    }

    # Healthcheck for orchestrators. No-store so probes don't poison any cache.
    location = /_health {
      access_log off;
      add_header Cache-Control "no-store" always;
      return 200 "ok\n";
    }

    # Root index — must always revalidate so new deploys land immediately.
    location = / {
      add_header Cache-Control "no-store, must-revalidate" always;
      add_header Pragma       "no-cache"                   always;
      add_header Expires      "0"                          always;
      try_files /index.html =404;
    }

    location = /index.html {
      add_header Cache-Control "no-store, must-revalidate" always;
      add_header Pragma       "no-cache"                   always;
      add_header Expires      "0"                          always;
    }

    # SPA fallback. Any unknown path (React Router routes, refreshes inside the
    # app) and any non-hashed root-level file (favicon, manifest, robots.txt)
    # resolves through here — all no-store, since they change per deploy.
    location / {
      add_header Cache-Control "no-store, must-revalidate" always;
      add_header Pragma       "no-cache"                   always;
      add_header Expires      "0"                          always;
      try_files $uri $uri/ /index.html;
    }
  }
}
